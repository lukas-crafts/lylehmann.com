name: Auto-approve PR

on:
  pull_request:
    types: [opened, reopened]
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.check_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-approve
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.check_run.pull_requests[0].number }}
        run: |
          gh pr review $PR_NUMBER --approve --body "LGTM! All checks passed."
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint, Types & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools via mise
        uses: jdx/mise-action@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Check
        run: mise run check

  build:
    name: Verify Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tools via mise
        uses: jdx/mise-action@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Build
        run: mise run build

name: Update Dependencies

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Update dependencies
        run: |
          # Update all dependencies to their latest versions
          pnpm update --latest --recursive
        continue-on-error: true

      - name: Run checks
        id: checks
        run: |
          pnpm check || echo "checks_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(deps): update dependencies

            Automated dependency updates via GitHub Actions
          branch: automated/dependency-updates
          delete-branch: true
          title: 'chore(deps): Automated dependency updates'
          body: |
            ## Automated Dependency Updates

            This PR contains automated dependency updates.

            ### What changed:
            - Updated all packages to their latest versions

            ### Verification:
            ${{ steps.checks.outputs.checks_failed == 'true' && '⚠️ Some checks failed - please review manually' || '✅ All checks passed' }}

            ---
            🤖 This PR was automatically created by the Update Dependencies workflow
          labels: |
            dependencies
            automated
          assignees: ${{ github.repository_owner }}

name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits and tags
      issues: write # Required to comment on issues
      pull-requests: write # Required to comment on PRs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to retrieve all commits history
          fetch-tags: true # Required to retrieve all tags
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: |
          git fetch --tags --force
          git fetch --prune --unshallow 2>/dev/null || true

      - name: Debug - Show tags
        run: |
          echo "All tags:"
          git tag --list --sort=-version:refname | head -20
          echo "Latest tag:"
          git describe --tags --abbrev=0 2>/dev/null || echo "No tags found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Only if publishing to npm
        run: npx semantic-release
name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits and tags
      issues: write # Required to comment on issues
      pull-requests: write # Required to comment on PRs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to retrieve all commits history
          fetch-tags: true # Required to retrieve all tags
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: |
          git fetch --tags --force
          git fetch --prune --unshallow 2>/dev/null || true

      - name: Clean up orphaned tags
        run: |
          echo "Removing tags not in current branch history..."
          # Get tags that are not ancestors of HEAD
          git tag --no-merged HEAD | while read tag; do
            echo "Removing orphaned tag: $tag"
            git tag -d "$tag" || true
          done
          echo "Cleanup complete"

      - name: Debug - Show tags
        run: |
          echo "All tags in current branch:"
          git tag --merged HEAD --list --sort=-version:refname | head -20
          echo ""
          echo "Latest version tag:"
          git tag --merged HEAD --list "v*" --sort=-version:refname | head -1 || echo "No version tags found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Only if publishing to npm
        run: npx semantic-release
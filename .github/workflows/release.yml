name: Release Build
on:
  push:
    tags:
      - 'v*'
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build
      - name: Zip build
        run: zip -r dist.zip dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip

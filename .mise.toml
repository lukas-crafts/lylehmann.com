[env]
_.file = ".env"

[tools]
node = "22"
bun = "latest"

[tasks.dev]
run = "bun run dev"
description = "Run Astro dev server"

[tasks.build]
run = "bun run build"
description = "Build the production site"

[tasks.preview]
run = "bun run preview"
description = "Preview the built site"

[tasks."check:types"]
run = "astro check"
description = "Run Astro type checking"

[tasks."check:lint"]
run = "biome check"
description = "Run Biome linter"

[tasks."check:test"]
run = "vitest run"
description = "Run tests once"

[tasks.check]
depends = ["check:types", "check:lint", "test"]
description = "Run all checks in parallel (types, lint, tests)"

[tasks.test]
run = "bun run test"
description = "Run tests once"

[tasks."test:watch"]
run = "vitest"
description = "Run tests in watch mode"

[tasks.fix]
run = "bun run fix"
description = "Auto-fix lint issues"

[tasks.sync]
run = "bun run sync"
description = "Sync Astro content"

[tasks.release]
run = "bun run release"
description = "Run semantic-release"

[tasks.lint]
run = "bun run check"
description = "Run all checks (types, lint, tests)"

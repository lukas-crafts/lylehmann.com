# trunk.yaml – Konfiguration für Trunk
# Weitere Infos: https://docs.trunk.io/cli
# Formatreferenz: https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.24.0

# Plugins für Trunk: https://docs.trunk.io/plugins
plugins:
  sources:
    - id: trunk
      ref: v1.7.1
      uri: https://github.com/trunk-io/plugins

# Runtimes für Tools: https://docs.trunk.io/runtimes
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8

# Linter-Konfiguration: https://docs.trunk.io/check/configuration
lint:
  ignore:
    - linters: [ALL]
      paths:
        - .trunk/**
        - .github/**
        - .cspell/**
        - .vscode/**
  disabled:
    - yamllint
    - codespell
    - cspell
    - markdown-link-check
    - stylelint
  enabled:
    - biome@1.9.4
    - gitleaks@8.27.2
    - markdownlint-cli2@0.18.1
    - markdownlint@0.45.0
    - checkov@3.2.450
    - git-diff-check
    - osv-scanner@2.0.3
    - oxipng@9.1.5
    - svgo@4.0.0
    - taplo@0.9.3
    - trufflehog@3.89.2

actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
